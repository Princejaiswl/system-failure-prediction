#version 3.8
services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: always

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "mypassword"]
    restart: always

  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      #- MLFLOW_ARTIFACT_URI=/mlruns
    volumes:
      - ./mlruns:/mlruns
      - ./mlflow.db:/mlflow.db
      #- /home/asus/P1/mlruns:/home/asus/P1/mlruns

    depends_on:
      - kafka
      - redis
    restart: always

  consumer:
    build: .
    command: python consumer.py
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      #- MLFLOW_ARTIFACT_URI=/mlruns
    volumes:
      - ./mlruns:/mlruns
      - ./mlflow.db:/mlflow.db
      #- /home/asus/P1/mlruns:/home/asus/P1/mlruns

    depends_on:
      - kafka
      - redis
    restart: always


#mlflow

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    container_name: mlflow-server
    ports:
      - "5000:5000"
    command:
      [
        "mlflow",
        "server",
        "--backend-store-uri", "sqlite:////mlflow/mlflow.db",
        "--default-artifact-root", "file:///mlruns",
        "--host", "0.0.0.0",
        "--port", "5000",
        "--allowed-hosts", "*"
      ]
    volumes:
      - ./mlruns:/mlruns
      - ./mlflow.db:/mlflow.db
    restart: always
